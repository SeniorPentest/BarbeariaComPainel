<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin • Barbearia Premium</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --card: rgba(18, 18, 18, 0.9);
            --card-border: rgba(255, 255, 255, 0.04);
            --muted: #a0a0a0;
            --green: #1dd19a;
            --yellow: #f4c441;
            --red: #ff5c5c;
        }

        body.admin {
            background-attachment: fixed;
            min-height: 100vh;
            color: var(--text-primary);
        }

        .admin-shell {
            min-height: 100vh;
            backdrop-filter: blur(8px);
            padding: 32px 0 64px;
            opacity: 0.2;
            filter: blur(6px);
            pointer-events: none;
            transition: opacity 0.35s ease, filter 0.35s ease;
        }

        .admin-shell.unlocked {
            opacity: 1;
            filter: none;
            pointer-events: auto;
        }

        .admin-inner {
            width: min(1180px, 92vw);
            margin: 0 auto;
        }

        .admin-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 18px;
            margin-bottom: 24px;
        }

        .admin-brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .brand-mark {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            background: linear-gradient(135deg, rgba(212, 175, 55, 0.18), rgba(255, 255, 255, 0.06));
            border: 1px solid var(--card-border);
            display: grid;
            place-items: center;
            box-shadow: 0 12px 34px rgba(0, 0, 0, 0.35);
        }

        .brand-title {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .brand-title span:first-child {
            color: var(--muted);
            letter-spacing: 0.12em;
            font-size: 0.75rem;
            text-transform: uppercase;
        }

        .brand-title span:last-child {
            font-family: var(--font-serif);
            font-size: 1.45rem;
            letter-spacing: 0.02em;
            color: var(--accent-color);
        }

        .summary-bar {
            background: var(--card);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 18px 20px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 14px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
        }

        .summary-item {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .summary-icon {
            width: 38px;
            height: 38px;
            border-radius: 12px;
            background: rgba(212, 175, 55, 0.12);
            border: 1px solid var(--card-border);
            display: grid;
            place-items: center;
            color: var(--accent-color);
        }

        .summary-text {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .summary-text .label {
            color: var(--muted);
            font-size: 0.85rem;
        }

        .summary-text .value {
            font-weight: 700;
        }

        .legend {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .legend span {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--card-border);
            color: var(--muted);
            font-size: 0.9rem;
        }

        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }

        .dot.green { background: var(--green); box-shadow: 0 0 12px rgba(29, 209, 154, 0.5); }
        .dot.yellow { background: var(--yellow); box-shadow: 0 0 12px rgba(244, 196, 65, 0.5); }
        .dot.red { background: var(--red); box-shadow: 0 0 12px rgba(255, 92, 92, 0.5); }

        .actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            align-items: center;
        }

        .btn-ghost {
            padding: 10px 14px;
            border-radius: 12px;
            border: 1px solid var(--card-border);
            background: rgba(255, 255, 255, 0.02);
            color: var(--text-primary);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-ghost:hover { border-color: var(--accent-color); }

        .schedule-grid {
            margin-top: 26px;
            display: grid;
            gap: 12px;
        }

        .slot-card {
            background: var(--card);
            border: 1px solid var(--card-border);
            border-radius: 14px;
            padding: 16px 18px;
            display: grid;
            grid-template-columns: 120px 1fr auto;
            align-items: center;
            gap: 16px;
            box-shadow: 0 16px 46px rgba(0, 0, 0, 0.32);
        }

        .slot-time {
            font-weight: 700;
            font-size: 1.05rem;
            letter-spacing: 0.02em;
        }

        .slot-body {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .status-pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            border-radius: 12px;
            font-weight: 700;
            border: 1px solid var(--card-border);
            width: fit-content;
        }

        .status-free { color: var(--green); background: rgba(29, 209, 154, 0.08); }
        .status-reserved { color: var(--yellow); background: rgba(244, 196, 65, 0.1); }
        .status-busy { color: var(--red); background: rgba(255, 92, 92, 0.08); }

        .slot-meta {
            color: var(--muted);
            font-size: 0.95rem;
        }

        .slot-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        .btn {
            border: none;
            cursor: pointer;
            padding: 10px 14px;
            border-radius: 12px;
            font-weight: 700;
            transition: all 0.2s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, rgba(212, 175, 55, 0.9), rgba(212, 175, 55, 0.75));
            color: #0a0a0a;
            box-shadow: 0 14px 34px rgba(212, 175, 55, 0.28);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.06);
            color: var(--text-primary);
            border: 1px solid var(--card-border);
        }

        .btn-danger {
            background: rgba(255, 92, 92, 0.1);
            color: var(--red);
            border: 1px solid rgba(255, 92, 92, 0.4);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .access-overlay {
            position: fixed;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(4px);
            z-index: 100;
            padding: 18px;
        }

        .access-overlay.open { display: flex; }

        .access-card {
            width: min(420px, 92vw);
            background: var(--card);
            border: 1px solid var(--card-border);
            border-radius: 18px;
            padding: 24px;
            box-shadow: 0 24px 64px rgba(0, 0, 0, 0.45);
        }

        .access-card h2 { margin-bottom: 8px; }
        .access-card p { color: var(--muted); margin-bottom: 14px; }

        .field {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 14px;
        }

        .field label { color: var(--muted); font-size: 0.95rem; }

        .field input, .field textarea, .field select {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: 12px;
            color: var(--text-primary);
            font-size: 1rem;
        }

        .error {
            color: var(--red);
            min-height: 20px;
            font-size: 0.95rem;
        }

        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(4px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 120;
            padding: 18px;
        }

        .modal-overlay.open { display: flex; }

        .modal-card {
            width: min(520px, 94vw);
            background: var(--card);
            border: 1px solid var(--card-border);
            border-radius: 18px;
            padding: 22px;
            box-shadow: 0 24px 70px rgba(0, 0, 0, 0.5);
        }

        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 10px;
        }

        .toast {
            position: fixed;
            bottom: 22px;
            right: 22px;
            background: rgba(20, 20, 20, 0.95);
            border: 1px solid var(--card-border);
            color: var(--text-primary);
            padding: 12px 14px;
            border-radius: 12px;
            box-shadow: 0 12px 36px rgba(0, 0, 0, 0.42);
            display: none;
        }

        .toast.show { display: block; }

        @media (max-width: 820px) {
            .slot-card {
                grid-template-columns: 1fr;
                align-items: flex-start;
            }

            .slot-actions { justify-content: flex-start; }

            .summary-bar { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body class="admin">
    <div id="access-modal" class="access-overlay open">
        <div class="access-card">
            <h2>Senha de Acesso</h2>
            <p>Área restrita para o barbeiro. Insira a senha para liberar o painel.</p>
            <form id="access-form">
                <div class="field">
                    <label for="access-password">Senha</label>
                    <input id="access-password" type="password" autocomplete="current-password" placeholder="Digite a senha" required>
                </div>
                <div class="error" id="access-error"></div>
                <button class="btn btn-primary" type="submit" style="width: 100%;">Entrar</button>
            </form>
        </div>
    </div>

    <main id="admin-shell" class="admin-shell">
        <div class="admin-inner">
            <header class="admin-header">
                <div class="admin-brand">
                    <div class="brand-mark">✂️</div>
                    <div class="brand-title">
                        <span>Área Administrativa</span>
                        <span>Barbearia Premium</span>
                    </div>
                </div>
                <div class="actions">
                    <button id="refresh-agenda" class="btn-ghost">Recarregar agenda</button>
                </div>
            </header>

            <section class="summary-bar">
                <div class="summary-item">
                    <div class="summary-icon">📅</div>
                    <div class="summary-text">
                        <span class="label">Data</span>
                        <span class="value" id="current-date"></span>
                    </div>
                </div>
                <div class="summary-item">
                    <div class="summary-icon">⏳</div>
                    <div class="summary-text">
                        <span class="label">Atualizado</span>
                        <span class="value" id="last-update">--</span>
                    </div>
                </div>
                <div class="legend">
                    <span><span class="dot green"></span> Livre</span>
                    <span><span class="dot yellow"></span> Reservado (Site)</span>
                    <span><span class="dot red"></span> Ocupado</span>
                </div>
            </section>

            <section class="schedule-grid" id="slot-list"></section>
        </div>
    </main>

    <div class="modal-overlay" id="walkin-modal">
        <div class="modal-card">
            <h3>Adicionar Cliente da Rua</h3>
            <p id="walkin-slot-label" style="color: var(--muted); margin-bottom: 14px;"></p>
            <form id="walkin-form">
                <div class="field">
                    <label for="walkin-name">Nome do Cliente</label>
                    <input id="walkin-name" type="text" placeholder="Ex: João Silva" required>
                </div>
                <div class="field">
                    <label for="walkin-service">Serviço</label>
                    <input id="walkin-service" type="text" placeholder="Corte, Barba..." required>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-secondary" id="walkin-cancel">Cancelar</button>
                    <button type="submit" class="btn btn-primary">Adicionar</button>
                </div>
            </form>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script src="admin.js"></script>
</body>
</html>
